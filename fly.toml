# fly.toml - Configuration Fly.io pour TFC Manager
# Docs: https://fly.io/docs/reference/configuration/

app = 'tfc-manager'
primary_region = 'cdg'  # Paris (le plus proche de l'Afrique centrale)

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'

[env]
  APP_ENV = 'production'
  APP_DEBUG = 'false'
  APP_LOCALE = 'fr'
  APP_FALLBACK_LOCALE = 'fr'
  LOG_CHANNEL = 'stderr'
  LOG_LEVEL = 'error'
  DB_CONNECTION = 'pgsql'
  SESSION_DRIVER = 'database'
  QUEUE_CONNECTION = 'database'
  CACHE_STORE = 'database'
  FILESYSTEM_DISK = 'local'
  BCRYPT_ROUNDS = '12'
  AI_DETECTION_PROVIDER = 'gptzero'
  AI_DETECTION_API_URL = 'https://api.gptzero.me/v2/predict/text'

# Les secrets sont configurés via : fly secrets set KEY=VALUE
# APP_KEY, DB_HOST, DB_PORT, DB_DATABASE, DB_USERNAME, DB_PASSWORD,
# AI_DETECTION_API_KEY, MAIL_*, APP_URL
